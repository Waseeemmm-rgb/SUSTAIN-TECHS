<!DOCTYPE html>
<html>
<head>
  <title>Sustain-Tech AI</title>
</head>
<body>
  <h1>Sustain-Tech AI - Plastic Detection</h1>

  <button onclick="init()">Start Camera</button>

  <div id="webcam-container"></div>
  <div id="label-container"></div>
  <div id="data-container"></div>

  <!-- TensorFlow.js -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

  <script>
    // Load the model from your uploaded folder
    const URL = "./tm-my-image-model/"; // folder in your repo

    let model, webcam, labelContainer, maxPredictions;

    async function init() {
        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        // Load model
        model = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        // Setup webcam
        webcam = new tmImage.Webcam(400, 300, true); // width, height, flip
        await webcam.setup();
        await webcam.play();
        window.requestAnimationFrame(loop);

        document.getElementById("webcam-container").appendChild(webcam.canvas);
        labelContainer = document.getElementById("label-container");
    }

    async function loop() {
        webcam.update();
        await predict();
        window.requestAnimationFrame(loop);
    }

    async function predict() {
        const prediction = await model.predict(webcam.canvas);
        let result = "";

        // Get the class with probability > 0.8
        prediction.forEach(p => {
            if (p.probability > 0.8) {
                result = p.className;
            }
        });

        // Show result
        labelContainer.innerHTML = "Detected: " + result;

        const dataContainer = document.getElementById("data-container");
        if (result === "Plastic") {
            dataContainer.innerHTML = `
                <h3>Plastic Analysis</h3>
                Type: HDPE <br>
                Max Temp: 130-160°C <br>
                Fuel Yield: 75% <br>
                Efficiency: High
            `;
        } else if (result === "Not Plastic") {
            dataContainer.innerHTML = "Not suitable for fuel ❌";
        } else {
            dataContainer.innerHTML = "";
        }
    }
  </script>
</body>
</html>
