<!DOCTYPE html>
<html>
<head>
  <title>SUSTAIN TECH AI - Camera</title>
</head>

<body style="text-align:center; font-family:sans-serif;">
  <h1>📷 Plastic Detection Camera</h1>

  <button onclick="init()">Start Camera</button>

  <div id="webcam-container"></div>
  <div id="label-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest"></script>

  <script>
    const URL = "./my_model/";

    let model, webcam, labelContainer, maxPredictions;

    async function init() {
      const modelURL = URL + "model.json";
      const metadataURL = URL + "metadata.json";

      model = await tmImage.load(modelURL, metadataURL);
      maxPredictions = model.getTotalClasses();

      webcam = new tmImage.Webcam(300, 300, true);
      await webcam.setup();
      await webcam.play();
      window.requestAnimationFrame(loop);

      document.getElementById("webcam-container").appendChild(webcam.canvas);

      labelContainer = document.getElementById("label-container");
      for (let i = 0; i < maxPredictions; i++) {
        labelContainer.appendChild(document.createElement("div"));
      }
    }

    async function loop() {
      webcam.update();
      await predict();
      window.requestAnimationFrame(loop);
    }

    async function predict() {
      const prediction = await model.predict(webcam.canvas);

      let topClass = "";
      let topProb = 0;

      for (let i = 0; i < prediction.length; i++) {
        const p = prediction[i];

        labelContainer.childNodes[i].innerHTML =
          p.className + ": " + p.probability.toFixed(2);

        if (p.probability > topProb) {
          topProb = p.probability;
          topClass = p.className;
        }
      }

      // CLEAR RESULT
      let resultBox = document.getElementById("result");
      if (!resultBox) {
        resultBox = document.createElement("h2");
        resultBox.id = "result";
        document.body.appendChild(resultBox);
      }

      if (topClass.toLowerCase().includes("plastic")) {
        resultBox.innerHTML = "✅ Plastic Detected";
        resultBox.style.color = "green";
      } else {
        resultBox.innerHTML = "❌ Not Plastic";
        resultBox.style.color = "red";
      }
    }
  </script>
</body>
</html>
